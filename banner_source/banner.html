<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    width: 1200px;
    height: 460px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Noto Serif KR', 'Malgun Gothic', serif;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: row-reverse;
    align-items: center;
    padding: 30px 36px;
  }

  .col {
    writing-mode: vertical-rl;
    font-size: 36px;
    font-weight: 900;
    color: #1a1a1a;
    letter-spacing: 0.04em;
    padding: 0 6px;
    line-height: 1.0;
    white-space: nowrap;
  }

  ruby { ruby-position: right; ruby-align: center; }
  rt { font-size: 12px; font-weight: 700; color: #1a1a1a; letter-spacing: 0; }
</style>
</head>
<body>
  <div class="container">

    <div class="col"><ruby>各<rt>각</rt></ruby>연구소</div>
    <div class="col">발굴<ruby>報<rt>보</rt></ruby><ruby>告<rt>고</rt></ruby><ruby>書<rt>셔</rt></ruby></div>
    <div class="col">파일<ruby>名<rt>명</rt></ruby>이달아</div>
    <div class="col"><ruby>旣<rt>긩</rt></ruby><ruby>存<rt>존</rt></ruby>프로그램</div>
    <div class="col">과서르사맛디</div>
    <div class="col">아니할쎄이런</div>
    <div class="col">전차로파일</div>
    <div class="col"><ruby>名<rt>명</rt></ruby>고티고져</div>
    <div class="col">할빼이셔도</div>
    <div class="col">마참내제뜨들</div>
    <div class="col">시러펴디못할</div>
    <div class="col">노미하니라내</div>
    <div class="col">이를<ruby>爲<rt>위</rt></ruby>하야</div>
    <div class="col">새로크롬<ruby>擴<rt>확</rt></ruby><ruby>張<rt>장</rt></ruby></div>
    <div class="col">프로그램을</div>
    <div class="col">밍노니사람마</div>
    <div class="col">다하야날로쑤메</div>
    <div class="col"><ruby>便<rt>편</rt></ruby><ruby>安<rt>안</rt></ruby>킈하고져</div>
    <div class="col">할따름이니라</div>

  </div>
</body>
</html>
