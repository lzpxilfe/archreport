<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'NanumBarunGothicYetHangulWeb';
    src: url('NanumBarunGothic-YetHangul.woff2') format('woff2'),
         url('NanumBarunGothic-YetHangul.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #ffffff; /* Clean white background */
    width: 1200px;
    height: 630px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
    font-family: 'NanumBarunGothicYetHangulWeb', 'NanumBarunGothicYetHangul', 'Nanum Barun Gothic Yet Hangul', 'Malgun Gothic', sans-serif;
  }

  .content-container {
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #ffffff;
  }

  /* 9 columns, 10 rows grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(9, 64px);
    grid-template-rows: repeat(10, 48px);
  }

  .cell {
    width: 64px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    font-weight: 800;
    color: #1c1917; /* Soft charcoal black */
    position: relative;
    line-height: 1;
    font-family: 'NanumBarunGothicYetHangulWeb', 'NanumBarunGothicYetHangul', 'Nanum Barun Gothic Yet Hangul', 'Malgun Gothic', sans-serif;
  }

  /* Hanja cell layout: Hanja on left, Middle Korean annotation on right */
  .hanja-cell {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    padding-left: 2px;
  }

  .hanja {
    font-size: 38px;
    font-weight: 800;
    color: #1c1917;
    font-family: 'NanumBarunGothicYetHangulWeb', 'NanumBarunGothicYetHangul', 'Nanum Barun Gothic Yet Hangul', 'Malgun Gothic', sans-serif;
  }

  /* Superscript-like Middle Korean annotation on the right */
  .ann {
    font-size: 18px;
    font-weight: 700;
    color: #44403c;
    margin-left: 1px;
    margin-top: -6px; /* Offset upward to align with the top-right of Hanja */
    font-family: 'NanumBarunGothicYetHangulWeb', 'NanumBarunGothicYetHangul', 'Nanum Barun Gothic Yet Hangul', 'Malgun Gothic', sans-serif;
  }
</style>
</head>
<body>

<!-- Delayed image to delay the onload event in headless Chrome -->
<img src="/delay_image.png" style="display:none;">

<div class="content-container">
  <div id="grid"></div>
</div>

<script>
/*
  중세 국어 + 동국정운식 한자음, 9열 × 10행 = 90자
  읽기 순서: 오른쪽 열 → 왼쪽 열, 위 → 아래

  중세 국어 및 한자음 구성:
  열 1: 各(각) 研(ᅀᅧᆫ) 究(규ᇰ) 所(소ᇰ) ᄋᆡ 發(바ᇙ) 掘(구ᇙ) 調(됴ᇰ) 査(사ᇰ) 報(보ᇰ)
  열 2: 告(고ᇰ) 書(서ᇰ) 파 일 名(며ᇰ) 이 本(본) 來(래ᇰ) ᄋᆡ 報(보ᇰ)
  열 3: 告(고ᇰ) 書(서ᇰ) 이 름 ᄋᆞᆯ 담 디 몯 ᄒᆞ 야
  열 4: 다 시 수 고 ᄅᆞᆯ 드 려 고 티 ᄂᆞᆫ
  열 5: 이 리 거 듭 ᄒᆞ ᄂᆞ 니 라 내 가
  열 6: 이 ᄅᆞᆯ 어 엿 비 너 겨 크 롬 擴(ᅘᅪᆨ)
  열 7: 張(쟈ᇰ) 프 로 그 램 ᄋᆞᆯ ᄆᆡᆼ ᄀᆞ 노 니
  열 8: 사 람 마 다 ᄡᅮ 메 날 로 便(뼌) 安(안)
  열 9: 킈 ᄒᆞ 고 져 ᄒᆞᆯ ᄯᆞ ᄅᆞ 미 니 라
*/
const COLS = 9;
const ROWS = 10;

const data = [
  // ── 열 1 (맨 오른쪽): 各研究所ᄋᆡ發掘調査報 ──
  ['各','각'], ['研','ᅀᅧᆫ'], ['究','규ᇰ'], ['所','소ᇰ'], ['ᄋᆡ',''], ['發','바ᇙ'], ['掘','구ᇙ'], ['調','됴ᇰ'], ['査','사ᇰ'], ['報','보ᇰ'],

  // ── 열 2: 告書파일名이本來ᄋᆡ報 ──
  ['告','고ᇰ'], ['書','서ᇰ'], ['파',''], ['일',''], ['名','며ᇰ'], ['이',''], ['本','본'], ['來','래ᇰ'], ['ᄋᆡ',''], ['報','보ᇰ'],

  // ── 열 3: 告書이름ᄋᆞᆯ담디몯ᄒᆞ야 ──
  ['告','고ᇰ'], ['書','서ᇰ'], ['이',''], ['름',''], ['ᄋᆞᆯ',''], ['담',''], ['디',''], ['몯',''], ['ᄒᆞ',''], ['야',''],

  // ── 열 4: 다시수고ᄅᆞᆯ드려고티ᄂᆞᆫ ──
  ['다',''], ['시',''], ['수',''], ['고',''], ['ᄅᆞᆯ',''], ['드',''], ['려',''], ['고',''], ['티',''], ['ᄂᆞᆫ',''],

  // ── 열 5: 이리거듭ᄒᆞᄂᆞ니라내가 ──
  ['이',''], ['리',''], ['거',''], ['듭',''], ['ᄒᆞ',''], ['ᄂᆞ',''], ['니',''], ['라',''], ['내',''], ['가',''],

  // ── 열 6: 이ᄅᆞᆯ어엿비너겨크롬擴 ──
  ['이',''], ['ᄅᆞᆯ',''], ['어',''], ['엿',''], ['비',''], ['너',''], ['겨',''], ['크',''], ['롬',''], ['擴','ᅘᅪᆨ'],

  // ── 열 7: 張프로그램ᄋᆞᆯᄆᆡᆼᄀᆞ노니 ──
  ['張','쟈ᇰ'], ['프',''], ['로',''], ['그',''], ['램',''], ['ᄋᆞᆯ',''], ['ᄆᆡᆼ',''], ['ᄀᆞ',''], ['노',''], ['니',''],

  // ── 열 8: 사람마다ᄡᅮ메날로便安 ──
  ['사',''], ['람',''], ['마',''], ['다',''], ['ᄡᅮ',''], ['메',''], ['날',''], ['로',''], ['便','뼌'], ['安','안'],

  // ── 열 9 (맨 왼쪽): 킈ᄒᆞ고져ᄒᆞᆯᄯᆞᄅᆞ미니라 ──
  ['킈',''], ['ᄒᆞ',''], ['고',''], ['져',''], ['ᄒᆞᆯ',''], ['ᄯᆞ',''], ['ᄅᆞ',''], ['미',''], ['니',''], ['라','']
];

const grid = document.getElementById('grid');

data.forEach(([char, ann], idx) => {
  const dataCol = Math.floor(idx / ROWS);
  const dataRow  = idx % ROWS;

  const cssCol = COLS - dataCol;   // 9 = 맨 오른쪽, 1 = 맨 왼쪽
  const cssRow = dataRow + 1;

  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.style.gridColumn = cssCol;
  cell.style.gridRow = cssRow;

  if (ann) {
    cell.className += ' hanja-cell';
    
    const hanjaSpan = document.createElement('span');
    hanjaSpan.className = 'hanja';
    hanjaSpan.textContent = char;
    cell.appendChild(hanjaSpan);

    const annSpan = document.createElement('span');
    annSpan.className = 'ann';
    annSpan.textContent = ann;
    cell.appendChild(annSpan);
  } else {
    cell.textContent = char;
  }

  grid.appendChild(cell);
});
</script>
</body>
</html>
